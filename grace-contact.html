<!DOCTYPE html>
<!--
  Grace's Holy Bell — support "Contact Us" form.
  Live at https://boginfactory.com/grace-contact.html

  ⚠️ THIS FILE (under docs/) IS THE SOURCE COPY ONLY. boginfactory.com is served
  by a SEPARATE repo: ebogin/Boginfactory-Landing-Page. To publish any change,
  mirror this file into that repo's root and push there — editing docs/ here
  does nothing to the live site. Same mirror pattern as grace-waitlist.html /
  graces-privacy-policy.html. See ../waitlist/SETUP.md Step 6.

  Styling mirrors grace-waitlist.html (the app's LCD-green theme).

  Submits to the same Cloudflare Worker as the waitlist, at POST /contact.
  Messages are delivered to eric@boginfactory.com. See ../waitlist/SETUP.md.
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us — Grace's Holy Bell</title>
  <meta name="description" content="Questions or feedback about Grace's Holy Bell? Send us a message.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    :root {
      --lcd-bg-light: #d4e4bc;
      --lcd-bg-dark:  #c4d4ac;
      --lcd-surface:  #c0d0a8;
      --lcd-inner:    #c8d8b0;
      --lcd-border:   #a0b080;
      --lcd-slider:   #8aaa6a;
      --lcd-dark:     #1a2a0a;
      --lcd-mid:      #4a6a3a;
      --lcd-title:    #5f7c4d;
      --lcd-on-dark:  #c8d8b0;
    }

    * { box-sizing: border-box; }

    html, body { margin: 0; padding: 0; min-height: 100%; }

    body {
      font-family: "Press Start 2P", monospace;
      background: linear-gradient(135deg, var(--lcd-bg-light), var(--lcd-bg-dark));
      background-attachment: fixed;
      color: var(--lcd-dark);
      line-height: 1.9;
      -webkit-font-smoothing: none;
      padding: 32px 20px 64px;
    }

    .card {
      max-width: 560px;
      margin: 0 auto;
      background: var(--lcd-surface);
      border: 4px solid var(--lcd-border);
      border-radius: 10px;
      padding: 32px 28px;
    }

    h1 {
      font-size: 18px;
      line-height: 1.6;
      color: var(--lcd-dark);
      margin: 0 0 16px;
    }

    .intro {
      font-size: 10px;
      color: var(--lcd-mid);
      line-height: 1.9;
      margin: 0 0 28px;
    }

    label {
      display: block;
      font-size: 9px;
      color: var(--lcd-title);
      margin: 0 0 8px;
    }

    .field { margin: 0 0 22px; }

    input, select, textarea {
      width: 100%;
      font-family: "Press Start 2P", monospace;
      font-size: 11px;
      color: var(--lcd-dark);
      background: var(--lcd-inner);
      border: 2px solid var(--lcd-border);
      border-radius: 4px;
      padding: 12px 10px;
      -webkit-font-smoothing: none;
    }

    /* Message box: same LCD look as the inputs, but a large open field. */
    textarea {
      min-height: 140px;
      line-height: 1.9;
      resize: vertical;
    }

    /* The dropdown keeps the page's pixel font; flag emoji still render via
       the browser's per-glyph emoji fallback. */
    select {
      appearance: none;
      -webkit-appearance: none;
    }

    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--lcd-slider);
    }

    button {
      width: 100%;
      font-family: "Press Start 2P", monospace;
      font-size: 12px;
      color: var(--lcd-on-dark);
      background: var(--lcd-slider);
      border: 2px solid var(--lcd-dark);
      border-radius: 4px;
      padding: 14px 10px;
      margin-top: 8px;
      cursor: pointer;
      -webkit-font-smoothing: none;
    }

    button:disabled { opacity: 0.5; cursor: default; }

    .status {
      font-size: 9px;
      color: var(--lcd-mid);
      line-height: 1.8;
      margin: 16px 0 0;
      min-height: 1.2em;
      text-align: center;
    }

    .status.error { color: #7a2a2a; }

    .footer {
      max-width: 560px;
      margin: 24px auto 0;
      text-align: center;
      font-size: 8px;
      color: var(--lcd-mid);
      line-height: 1.8;
    }

    .footer a { color: var(--lcd-title); }

    @media (max-width: 480px) {
      body { padding: 20px 12px 48px; }
      .card { padding: 24px 18px; }
      h1 { font-size: 15px; }
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>CONTACT US</h1>
    <p class="intro">
      Questions or feedback about Grace's Holy Bell? Send us a message and
      we'll get back to you.
    </p>

    <form id="contact-form" novalidate>
      <div class="field">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" autocomplete="name">
      </div>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" autocomplete="email" inputmode="email">
      </div>
      <div class="field">
        <label for="country">Country</label>
        <select id="country" name="country" autocomplete="country-name">
          <option value="">Select your country…</option>
        </select>
      </div>
      <div class="field">
        <label for="message">Message</label>
        <textarea id="message" name="message" rows="6"></textarea>
      </div>

      <!-- Honeypot: hidden from people, tempting to bots. Leave blank. -->
      <input type="text" id="website" name="website" tabindex="-1" autocomplete="off"
             aria-hidden="true" style="position:absolute;left:-9999px;width:1px;height:1px;opacity:0;">

      <button type="submit" id="submit-btn">SEND MESSAGE</button>
      <p class="status" id="status"></p>
    </form>
  </main>

  <p class="footer">
    Grace's Holy Bell &middot; Boginfactory &middot;
    <a href="graces-privacy-policy.html">Privacy Policy</a>
  </p>

  <script>
    // ── CONFIG ───────────────────────────────────────────────────────────
    // Set this to your deployed Cloudflare Worker URL. See waitlist/SETUP.md.
    const WORKER_ENDPOINT = "https://grace-waitlist.grace-waitlist.workers.dev";
    // ─────────────────────────────────────────────────────────────────────

    // ── Country dropdown ──────────────────────────────────────────────────
    // Standard ISO 3166 country list with calling codes. Flags are rendered as
    // emoji derived from the two-letter code (no image assets needed).
    const COUNTRIES = [
      ["Afghanistan","AF","93"],["Albania","AL","355"],["Algeria","DZ","213"],
      ["Andorra","AD","376"],["Angola","AO","244"],["Argentina","AR","54"],
      ["Armenia","AM","374"],["Australia","AU","61"],["Austria","AT","43"],
      ["Azerbaijan","AZ","994"],["Bahamas","BS","1"],["Bahrain","BH","973"],
      ["Bangladesh","BD","880"],["Barbados","BB","1"],["Belarus","BY","375"],
      ["Belgium","BE","32"],["Belize","BZ","501"],["Benin","BJ","229"],
      ["Bhutan","BT","975"],["Bolivia","BO","591"],["Bosnia & Herzegovina","BA","387"],
      ["Botswana","BW","267"],["Brazil","BR","55"],["Brunei","BN","673"],
      ["Bulgaria","BG","359"],["Burkina Faso","BF","226"],["Burundi","BI","257"],
      ["Cambodia","KH","855"],["Cameroon","CM","237"],["Canada","CA","1"],
      ["Cape Verde","CV","238"],["Chad","TD","235"],["Chile","CL","56"],
      ["China","CN","86"],["Colombia","CO","57"],["Comoros","KM","269"],
      ["Congo","CG","242"],["Costa Rica","CR","506"],["Croatia","HR","385"],
      ["Cuba","CU","53"],["Cyprus","CY","357"],["Czechia","CZ","420"],
      ["Denmark","DK","45"],["Djibouti","DJ","253"],["Dominica","DM","1"],
      ["Dominican Republic","DO","1"],["Ecuador","EC","593"],["Egypt","EG","20"],
      ["El Salvador","SV","503"],["Estonia","EE","372"],["Eswatini","SZ","268"],
      ["Ethiopia","ET","251"],["Fiji","FJ","679"],["Finland","FI","358"],
      ["France","FR","33"],["Gabon","GA","241"],["Gambia","GM","220"],
      ["Georgia","GE","995"],["Germany","DE","49"],["Ghana","GH","233"],
      ["Greece","GR","30"],["Grenada","GD","1"],["Guatemala","GT","502"],
      ["Guinea","GN","224"],["Guyana","GY","592"],["Haiti","HT","509"],
      ["Honduras","HN","504"],["Hong Kong","HK","852"],["Hungary","HU","36"],
      ["Iceland","IS","354"],["India","IN","91"],["Indonesia","ID","62"],
      ["Iran","IR","98"],["Iraq","IQ","964"],["Ireland","IE","353"],
      ["Israel","IL","972"],["Italy","IT","39"],["Jamaica","JM","1"],
      ["Japan","JP","81"],["Jordan","JO","962"],["Kazakhstan","KZ","7"],
      ["Kenya","KE","254"],["Kuwait","KW","965"],["Kyrgyzstan","KG","996"],
      ["Laos","LA","856"],["Latvia","LV","371"],["Lebanon","LB","961"],
      ["Lesotho","LS","266"],["Liberia","LR","231"],["Libya","LY","218"],
      ["Liechtenstein","LI","423"],["Lithuania","LT","370"],["Luxembourg","LU","352"],
      ["Macau","MO","853"],["Madagascar","MG","261"],["Malawi","MW","265"],
      ["Malaysia","MY","60"],["Maldives","MV","960"],["Mali","ML","223"],
      ["Malta","MT","356"],["Mauritania","MR","222"],["Mauritius","MU","230"],
      ["Mexico","MX","52"],["Moldova","MD","373"],["Monaco","MC","377"],
      ["Mongolia","MN","976"],["Montenegro","ME","382"],["Morocco","MA","212"],
      ["Mozambique","MZ","258"],["Myanmar","MM","95"],["Namibia","NA","264"],
      ["Nepal","NP","977"],["Netherlands","NL","31"],["New Zealand","NZ","64"],
      ["Nicaragua","NI","505"],["Niger","NE","227"],["Nigeria","NG","234"],
      ["North Korea","KP","850"],["North Macedonia","MK","389"],["Norway","NO","47"],
      ["Oman","OM","968"],["Pakistan","PK","92"],["Panama","PA","507"],
      ["Papua New Guinea","PG","675"],["Paraguay","PY","595"],["Peru","PE","51"],
      ["Philippines","PH","63"],["Poland","PL","48"],["Portugal","PT","351"],
      ["Qatar","QA","974"],["Romania","RO","40"],["Russia","RU","7"],
      ["Rwanda","RW","250"],["Saudi Arabia","SA","966"],["Senegal","SN","221"],
      ["Serbia","RS","381"],["Seychelles","SC","248"],["Sierra Leone","SL","232"],
      ["Singapore","SG","65"],["Slovakia","SK","421"],["Slovenia","SI","386"],
      ["Somalia","SO","252"],["South Africa","ZA","27"],["South Korea","KR","82"],
      ["South Sudan","SS","211"],["Spain","ES","34"],["Sri Lanka","LK","94"],
      ["Sudan","SD","249"],["Suriname","SR","597"],["Sweden","SE","46"],
      ["Switzerland","CH","41"],["Syria","SY","963"],["Taiwan","TW","886"],
      ["Tajikistan","TJ","992"],["Tanzania","TZ","255"],["Thailand","TH","66"],
      ["Togo","TG","228"],["Trinidad & Tobago","TT","1"],["Tunisia","TN","216"],
      ["Turkey","TR","90"],["Turkmenistan","TM","993"],["Uganda","UG","256"],
      ["Ukraine","UA","380"],["United Arab Emirates","AE","971"],
      ["United Kingdom","GB","44"],["United States","US","1"],["Uruguay","UY","598"],
      ["Uzbekistan","UZ","998"],["Venezuela","VE","58"],["Vietnam","VN","84"],
      ["Yemen","YE","967"],["Zambia","ZM","260"],["Zimbabwe","ZW","263"],
    ];

    function flagEmoji(iso2) {
      return iso2.toUpperCase().replace(/./g, (c) =>
        String.fromCodePoint(127397 + c.charCodeAt(0))
      );
    }

    const countrySelect = document.getElementById("country");
    const byName = Object.fromEntries(COUNTRIES.map((c) => [c[0], c]));

    // Our likely markets float to the top, then the EU bloc, then everyone else.
    const TOP = ["United States", "Canada", "United Kingdom"];
    // EU-27 member states (the UK is intentionally NOT here — it's pinned above).
    const EU = [
      "Austria", "Belgium", "Bulgaria", "Croatia", "Cyprus", "Czechia",
      "Denmark", "Estonia", "Finland", "France", "Germany", "Greece",
      "Hungary", "Ireland", "Italy", "Latvia", "Lithuania", "Luxembourg",
      "Malta", "Netherlands", "Poland", "Portugal", "Romania", "Slovakia",
      "Slovenia", "Spain", "Sweden",
    ];
    const grouped = new Set([...TOP, ...EU]);

    function addCountry(name) {
      if (!byName[name]) return; // guard against a name typo in TOP/EU
      const [n, iso2] = byName[name];
      const opt = document.createElement("option");
      // Stored value stays plain text (no emoji) so the CSV reads cleanly.
      // No phone/dial code here — this form doesn't collect a phone number.
      opt.value = n;
      opt.textContent = flagEmoji(iso2) + "  " + n;
      countrySelect.appendChild(opt);
    }

    function addDivider() {
      const opt = document.createElement("option");
      opt.disabled = true;
      opt.textContent = "──────────";
      countrySelect.appendChild(opt);
    }

    TOP.forEach(addCountry);
    addDivider();
    EU.forEach(addCountry); // already alphabetical
    addDivider();
    // Remaining countries, alphabetical (COUNTRIES is already sorted by name).
    COUNTRIES.map((c) => c[0]).filter((n) => !grouped.has(n)).forEach(addCountry);

    // ── Submit ────────────────────────────────────────────────────────────
    const form = document.getElementById("contact-form");
    const statusEl = document.getElementById("status");
    const submitBtn = document.getElementById("submit-btn");

    function isEmail(v) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const email = document.getElementById("email").value.trim();
      const message = document.getElementById("message").value.trim();

      if (!isEmail(email)) {
        statusEl.className = "status error";
        statusEl.textContent = "Please enter a valid email.";
        return;
      }
      if (!message) {
        statusEl.className = "status error";
        statusEl.textContent = "Please enter a message.";
        return;
      }

      statusEl.className = "status";
      statusEl.textContent = "Sending…";
      submitBtn.disabled = true;

      const payload = {
        name:    document.getElementById("name").value.trim(),
        email:   email,
        country: document.getElementById("country").value.trim(),
        message: message,
        website: document.getElementById("website").value.trim(), // honeypot
      };

      try {
        const res = await fetch(WORKER_ENDPOINT + "/contact", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        if (!res.ok) throw new Error("Request failed: " + res.status);
        form.reset();
        statusEl.className = "status";
        statusEl.textContent = "Thanks — your message is on its way. We'll be in touch.";
      } catch (err) {
        statusEl.className = "status error";
        statusEl.textContent = "Something went wrong. Please try again.";
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
